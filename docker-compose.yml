services:
  hadoop-namenode:
    container_name: hadoop-namenode
    image: apache/hadoop:3.4.1
    profiles: ["hadoop", "hive", "spark", "streaming", "full"]
    ports:
    - "9870:9870"
    volumes:
    - ./hadoop-config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
    - ./hadoop-config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
    command: ["bash", "-c", "[ -d /opt/hadoop/etc/hadoop/dfs/name/current ] || hdfs namenode -format && hdfs namenode"]

  hadoop-datanode-1:
    container_name: hadoop-datanode-1
    image: apache/hadoop:3.4.1
    profiles: ["hadoop", "hive", "spark", "streaming", "full"]
    ports:
    - "9864:9864"
    volumes:
    - ./hadoop-config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
    - ./hadoop-config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
    command: ["bash", "-c", "hdfs datanode"]

  hadoop-datanode-2:
    container_name: hadoop-datanode-2
    image: apache/hadoop:3.4.1
    profiles: ["hadoop", "hive", "spark", "streaming", "full"]
    ports:
    - "9865:9864"
    volumes:
    - ./hadoop-config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
    - ./hadoop-config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
    command: ["bash", "-c", "hdfs datanode"]

  postgres-metastore:
    image: postgres:14
    container_name: postgres-metastore
    profiles: ["hive", "full"]
    environment:
      - POSTGRES_DB=metastore_db
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=password
    ports:
      - "5332:5432"

  postgres-hue:
    image: postgres:14
    container_name: postgres-hue
    profiles: ["hive", "full"]
    environment:
      POSTGRES_DB: hue
      POSTGRES_USER: hue
      POSTGRES_PASSWORD: hue
    ports:
      - "5543:5432"

  metastore:
    image: apache/hive:4.0.1
    container_name: metastore
    profiles: ["hive", "full"]
    entrypoint: ["sh", "-c", "ln -sf /opt/hadoop/share/hadoop/tools/lib/hadoop-aws-3.3.6.jar /opt/hadoop/share/hadoop/common/lib/ && ln -sf /opt/hadoop/share/hadoop/tools/lib/aws-java-sdk-bundle-1.12.367.jar /opt/hadoop/share/hadoop/common/lib/ && sleep 3 && /entrypoint.sh"] #esperar a que el postgre esté listo
    environment:
      - SERVICE_NAME=metastore
      - DB_DRIVER=postgres
      - SERVICE_OPTS=-Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres-metastore:5432/metastore_db -Djavax.jdo.option.ConnectionUserName=hive -Djavax.jdo.option.ConnectionPassword=password
    ports:
      - "9083:9083"
    volumes:
      - ./hadoop-config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./hadoop-config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./hive-config/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./postgres-driver/postgresql-42.7.6.jar:/opt/hive/lib/postgres.jar
    depends_on:
      - postgres-metastore

  hive:
    image: apache/hive:4.0.1
    container_name: hive-server
    profiles: ["hive", "full"]
    entrypoint: ["sh", "-c", "rm -f /opt/hive/conf/hiveserver2.pid && ln -sf /opt/hadoop/share/hadoop/tools/lib/hadoop-aws-3.3.6.jar /opt/hadoop/share/hadoop/common/lib/ && ln -sf /opt/hadoop/share/hadoop/tools/lib/aws-java-sdk-bundle-1.12.367.jar /opt/hadoop/share/hadoop/common/lib/ && sleep 4 && /entrypoint.sh"] #esperar a que el postgre esté listo
    environment:
      - SERVICE_NAME=hiveserver2
      - IS_RESUME=true #adicional por el metastore
      - SERVICE_OPTS=-Dhive.metastore.uris=thrift://metastore:9083 -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres-metastore:5432/metastore_db -Djavax.jdo.option.ConnectionUserName=hive -Djavax.jdo.option.ConnectionPassword=password #adicional por el metastore
      - SKIP_SCHEMA_INIT=false
    depends_on:
      - hadoop-namenode
      - metastore #adicional por el metastore
    ports:
      - "10000:10000"  # JDBC
      - "10002:10002"  # Web UI / WebHCat
    volumes:
      - ./hadoop-config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./hadoop-config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./hive-config/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./postgres-driver/postgresql-42.7.6.jar:/opt/hive/lib/postgres.jar #ADICIONAL POR EL METASTORE

  hue:
    image: gethue/hue:latest  # v4.11.0 - no publica tags de versión en Docker Hub
    container_name: hue
    profiles: ["hive", "full"]
    depends_on:
      - postgres-hue
    ports:
      - "8888:8888"
    volumes:
      - ./hue-config/hue.ini:/usr/share/hue/desktop/conf/hue.ini

  spark-master:
    image: apache/spark:4.1.1
    container_name: spark-master
    profiles: ["spark", "full"]
    command: bash -c "/opt/spark/bin/spark-class org.apache.spark.deploy.master.Master"
    ports:
      - "7077:7077"   # Puerto para workers
      - "8081:8080"   # Interfaz web del master
    volumes:
      - ./hadoop-config/core-site.xml:/opt/spark/conf/core-site.xml
    depends_on:
      - hadoop-namenode

  spark-worker-1:
    image: apache/spark:4.1.1
    container_name: spark-worker-1
    profiles: ["spark", "full"]
    command: bash -c "/opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077"
    ports:
      - "8082:8081"   # Interfaz web del worker
    volumes:
      - ./hadoop-config/core-site.xml:/opt/spark/conf/core-site.xml
    depends_on:
      - spark-master

  spark-worker-2:
    image: apache/spark:4.1.1
    container_name: spark-worker-2
    profiles: ["spark", "full"]
    command: bash -c "/opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077"
    ports:
      - "8083:8081"   # Interfaz web del worker
    volumes:
      - ./hadoop-config/core-site.xml:/opt/spark/conf/core-site.xml
    depends_on:
      - spark-master

  python-pyspark4-jupyter:
    image: python-pyspark4-jupyter
    container_name: python-pyspark4-jupyter
    profiles: ["spark", "full"]
    ports:
      - "8084:8888"

  postgres-streaming:
    image: postgres:14
    container_name: postgres-streaming
    profiles: ["streaming", "full"]
    environment:
      POSTGRES_DB: streaming
      POSTGRES_USER: flink
      POSTGRES_PASSWORD: flink
    ports:
      - "5545:5432"

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    profiles: ["streaming", "full"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "bigdata-cluster-kafka-001"
    ports:
      - "9092:9092"

  flink-jobmanager:
    image: apache/flink:1.19.0-scala_2.12
    container_name: flink-jobmanager
    profiles: ["streaming", "full"]
    command: >
      bash -c "
        find /opt/flink/lib/extra -name '*.jar' -exec cp {} /opt/flink/lib/ \; 2>/dev/null || true;
        /docker-entrypoint.sh jobmanager
      "
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
    volumes:
      - ./flink-config/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml
      - ./flink-jars:/opt/flink/lib/extra
      - ./hadoop-config/core-site.xml:/opt/flink/conf/core-site.xml
      - ./hadoop-config/hdfs-site.xml:/opt/flink/conf/hdfs-site.xml
      - ./postgres-driver/postgresql-42.7.6.jar:/opt/flink/lib/postgresql-42.7.6.jar
      - ./flink-jobs:/opt/flink/jobs
    ports:
      - "8085:8081"
    depends_on:
      - hadoop-namenode
      - kafka
      - postgres-streaming

  flink-taskmanager:
    image: apache/flink:1.19.0-scala_2.12
    container_name: flink-taskmanager
    profiles: ["streaming", "full"]
    command: >
      bash -c "
        find /opt/flink/lib/extra -name '*.jar' -exec cp {} /opt/flink/lib/ \; 2>/dev/null || true;
        /docker-entrypoint.sh taskmanager
      "
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
    volumes:
      - ./flink-config/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml
      - ./flink-jars:/opt/flink/lib/extra
      - ./hadoop-config/core-site.xml:/opt/flink/conf/core-site.xml
      - ./hadoop-config/hdfs-site.xml:/opt/flink/conf/hdfs-site.xml
      - ./postgres-driver/postgresql-42.7.6.jar:/opt/flink/lib/postgresql-42.7.6.jar
    depends_on:
      - flink-jobmanager

  tienda-web:
    image: python:3.11-slim
    container_name: tienda-web
    profiles: ["streaming", "full"]
    ports:
      - "8091:8091"
    volumes:
      - ./tienda-web:/app
    working_dir: /app
    command: bash -c "pip install -r requirements.txt -q && uvicorn main:app --host 0.0.0.0 --port 8091"
    depends_on:
      - kafka

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    profiles: ["streaming", "full"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 1s
    volumes:
      - ./grafana-config/datasources:/etc/grafana/provisioning/datasources
      - ./grafana-config/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - postgres-streaming

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    profiles: ["streaming", "full"]
    environment:
      KAFKA_CLUSTERS_0_NAME: bigdata-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    depends_on:
      - kafka

  superset:
    image: apache/superset:6.1.0rc1
    container_name: superset
    profiles: ["full"]
    user: root
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_LOAD_EXAMPLES=no
    depends_on:
      - hive
    command: >
      /bin/bash -c "
        apt-get update &&
        apt-get install -y build-essential gcc g++ python3-dev libsasl2-dev &&
        /app/.venv/bin/python -m ensurepip && /app/.venv/bin/python -m pip install pyhive thrift sasl thrift-sasl &&
        superset db upgrade &&
        superset fab create-admin --username admin --firstname admin --lastname admin --email admin@superset.com --password admin &&
        superset init &&
        echo '' &&
        echo '╔══════════════════════════════════════════════════╗' &&
        echo '║       CLUSTER BIG DATA LEVANTADO                 ║' &&
        echo '╠══════════════════════════════════════════════════╣' &&
        echo '║  Hadoop NameNode   →  http://localhost:9870       ║' &&
        echo '║  Hadoop DataNode 1 →  http://localhost:9864       ║' &&
        echo '║  Hadoop DataNode 2 →  http://localhost:9865       ║' &&
        echo '║  Hive Web UI       →  http://localhost:10002      ║' &&
        echo '║  Hue               →  http://localhost:8888       ║' &&
        echo '║  Spark Master      →  http://localhost:8081       ║' &&
        echo '║  Jupyter Notebook  →  http://localhost:8084       ║' &&
        echo '║  Superset          →  http://localhost:8088       ║' &&
        echo '╚══════════════════════════════════════════════════╝' &&
        echo '' &&
        superset run -h 0.0.0.0 -p 8088 --with-threads --reload --debugger
      "
