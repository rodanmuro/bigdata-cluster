apiVersion: 1

datasources:
  - name: PostgreSQL-Streaming
    type: postgres
    uid: postgres-streaming
    url: postgres-streaming:5432
    user: flink
    secureJsonData:
      password: flink
    jsonData:
      database: streaming
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 10
      connMaxLifetime: 14400
      postgresVersion: 1400
      timescaledb: false
    isDefault: true
    editable: true
